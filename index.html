    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ─── FIREBASE INIT ───────────────────────────────────────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyDML6tbSONWaW8-5_SfaIC63MtVk4Oq_Xs",
            authDomain: "general-57884.firebaseapp.com",
            databaseURL: "https://general-57884-default-rtdb.firebaseio.com",
            projectId: "general-57884",
            storageBucket: "general-57884.firebasestorage.app",
            messagingSenderId: "5002724584",
            appId: "1:5002724584:web:9ad7ef66d69265b8b9b55d"
        };

        let db = null;
        try {
            if (typeof firebase !== 'undefined') {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
            }
        } catch(e) { console.error("Firebase init failed:", e); }

        const LOGO_URL = "https://i.ibb.co.com/cKhJ7Sbv/1000032566-removebg-preview.png";

        // ─── FIRESTORE HELPERS (Strict Admin Control) ────────────────────────────────
        async function fetchDoc(path) {
            if (!db) return null;
            try {
                const [col, doc] = path.split('/');
                const snap = await db.collection(col).doc(doc).get();
                return snap.exists ? { id: snap.id, ...snap.data() } : null;
            } catch(e) { console.warn("fetchDoc error:", path, e); return null; }
        }

        async function fetchCollection(col, orderField = 'order', conditions = []) {
            if (!db) return [];
            try {
                let q = db.collection(col);
                conditions.forEach(([field, op, val]) => { q = q.where(field, op, val); });
                if (orderField) q = q.orderBy(orderField, 'asc');
                const snap = await q.get();
                return snap.docs.map(d => ({ id: d.id, ...d.data() }));
            } catch(e) { console.warn("fetchCollection error:", col, e); return []; }
        }

        // ─── ICONS ───────────────────────────────────────────────────────────────────
        const Icons = {
            Menu: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"/></svg>,
            X: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>,
            User: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>,
            BookOpen: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>,
            Award: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>,
            Phone: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>,
            Message: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>,
            Settings: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>,
            Play: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"/></svg>,
            Star: () => <svg className="w-5 h-5 text-amber-500 drop-shadow-sm" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>,
            MapPin: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>,
            ChevronLeft: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M15 19l-7-7 7-7"/></svg>,
            Bell: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>,
            Loader: () => <svg className="w-8 h-8 animate-spin text-emerald-600" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>,
        };

        // ─── SHARED COMPONENTS ────────────────────────────────────────────────────────
        const Avatar = ({ name, color, imageUrl, className="" }) => {
            const [imgError, setImgError] = useState(false);
            useEffect(() => { setImgError(false); }, [imageUrl]);
            
            if (imageUrl && !imgError) {
                return <img src={imageUrl} alt={name} loading="lazy" className={`object-cover rounded-full bg-white/60 p-1 backdrop-blur-md ${className}`} onError={() => setImgError(true)} />;
            }
            const initials = name ? name.split(' ').filter(Boolean).map(n => n[0]).join('').substring(0, 2) : '?';
            return <div className={`flex items-center justify-center rounded-full text-white font-bold text-xl border-4 border-white/60 backdrop-blur-md ${color || 'bg-emerald-500'} ${className}`}>{initials}</div>;
        };

        const LoadingSpinner = ({ text = "লোড হচ্ছে..." }) => (
            <div className="flex flex-col items-center justify-center py-20 gap-4">
                <Icons.Loader />
                <p className="text-nature-700 font-medium">{text}</p>
            </div>
        );

        const EmptyState = ({ icon = "📭", title, subtitle }) => (
            <div className="glass-panel p-12 text-center rounded-3xl border border-dashed border-white/80 w-full">
                <div className="text-5xl mb-4 opacity-80">{icon}</div>
                <p className="text-lg font-bold text-nature-800">{title}</p>
                {subtitle && <p className="text-sm text-nature-600 mt-2 font-medium">{subtitle}</p>}
            </div>
        );

        // ─── ADMIN CONTROLLED COUNTDOWN TIMER ──────────────────────────────────────
        const CountdownTimer = () => {
            const [timeLeft, setTimeLeft] = useState(null);
            const [data, setData] = useState({ label: "", isActive: false });

            useEffect(() => {
                let interval;
                if (db) {
                    db.collection('settings').doc('admissionCountdown').get().then(snap => {
                        if (snap.exists && snap.data().isActive && snap.data().targetDate) {
                            setData(snap.data());
                            const ts = snap.data().targetDate.toMillis ? snap.data().targetDate.toMillis() : new Date(snap.data().targetDate).getTime();
                            
                            const tick = () => {
                                const diff = ts - Date.now();
                                if (diff <= 0) { clearInterval(interval); setTimeLeft(null); return; }
                                setTimeLeft({
                                    days: Math.floor(diff / 86400000),
                                    hours: Math.floor((diff / 3600000) % 24),
                                    minutes: Math.floor((diff / 60000) % 60),
                                    seconds: Math.floor((diff / 1000) % 60)
                                });
                            };
                            tick();
                            interval = setInterval(tick, 1000);
                        }
                    }).catch(e => console.warn(e));
                }
                return () => clearInterval(interval);
            }, []);

            if (!data.isActive || !timeLeft) return null; // Hide completely if not active in Admin

            const units = [
                { key:'days', val: timeLeft.days, label:'দিন' },
                { key:'hours', val: timeLeft.hours, label:'ঘণ্টা' },
                { key:'minutes', val: timeLeft.minutes, label:'মিনিট' },
                { key:'seconds', val: timeLeft.seconds, label:'সেকেন্ড' },
            ];

            return (
                <div className="mt-6 animate-fade-in">
                    <p className="text-emerald-800 font-bold text-sm mb-3 uppercase tracking-widest bg-white/40 inline-block px-4 py-1 rounded-full">{data.label}</p>
                    <div className="flex justify-center gap-3">
                        {units.map(u => (
                            <div key={u.key} className="glass-panel w-16 h-16 rounded-xl flex flex-col items-center justify-center border-white/80 shadow-lg bg-white/40">
                                <span className="text-2xl font-extrabold text-nature-950 leading-none count-up">{String(u.val).padStart(2,'0')}</span>
                                <span className="text-[10px] uppercase font-bold text-emerald-800 mt-1">{u.label}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ─── ADMIN CONTROLLED POPUP ────────────────────────────────────────────────
        const AdmissionPopup = ({ popupData, onClose }) => {
            if (!popupData || !popupData.isActive) return null;
            return (
                <div className="fixed inset-0 z-[100] bg-nature-950/60 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
                    <div className="glass-panel w-full max-w-lg rounded-3xl overflow-hidden border-white/80 shadow-2xl relative bg-white/80">
                        <button onClick={onClose} className="absolute top-4 right-4 text-white bg-black/20 p-2 rounded-full hover:bg-black/40 z-10 transition"><Icons.X /></button>
                        <div className="bg-gradient-to-r from-emerald-500 to-teal-600 p-8 text-center text-white relative overflow-hidden">
                            <div className="absolute inset-0 opacity-30 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] mix-blend-overlay"></div>
                            <h2 className="text-3xl font-bold relative z-10 drop-shadow-md">{popupData.title}</h2>
                            <p className="mt-2 text-emerald-100 font-medium relative z-10">{popupData.subtitle}</p>
                        </div>
                        <div className="p-8 text-center bg-white/60">
                            <p className="text-nature-900 font-medium mb-6">{popupData.body}</p>
                            {popupData.ctaLink ? (
                                <a href={popupData.ctaLink} className="glass-btn block w-full py-4 rounded-xl font-bold text-lg shadow-lg text-center">{popupData.ctaText || "বিস্তারিত জানুন"}</a>
                            ) : (
                                <button onClick={onClose} className="glass-btn w-full py-4 rounded-xl font-bold text-lg shadow-lg">{popupData.ctaText || "বিস্তারিত জানুন"}</button>
                            )}
                            <button onClick={onClose} className="mt-4 text-sm text-nature-600 font-bold hover:underline hover:text-nature-900">না, ধন্যবাদ</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ─── HOME VIEW ────────────────────────────────────────────────────────────────
        const HomeView = ({ navigateTo, siteData, setPopupOpen }) => {
            const [stories, setStories] = useState([]);
            const [gallery, setGallery] = useState([]);

            useEffect(() => {
                fetchCollection('successStories', 'order', [['isActive','==',true]])
                    .then(data => setStories(data));
                fetchCollection('gallery', 'order', [['isActive','==',true]])
                    .then(data => setGallery(data.slice(0, 4)));
            }, []);

            return (
                <div className="animate-fade-in pb-20">
                    {/* HERO SECTION */}
                    <section className="relative pt-12 pb-16 md:pt-24 md:pb-20 px-4">
                        <div className="relative z-10 max-w-6xl mx-auto flex flex-col items-center text-center animate-slide-up">
                            
                            {siteData?.seatLimitBadge && (
                                <div className="mb-6 inline-flex items-center gap-2 bg-red-100/80 backdrop-blur-sm text-red-700 px-4 py-1.5 rounded-full font-bold text-sm border border-red-200 shadow-sm animate-pulse-glow">
                                    <span className="w-2 h-2 rounded-full bg-red-600"></span>
                                    {siteData.seatLimitBadge}
                                </div>
                            )}

                            <div className="glass-panel p-4 rounded-full mb-6 inline-block animate-float shadow-xl border-white/80">
                                <img src={LOGO_URL} alt="Logo" className="h-20 md:h-32 w-auto object-contain drop-shadow-2xl" />
                            </div>
                            <h1 className="text-4xl sm:text-5xl md:text-7xl font-extrabold text-nature-950 mb-4 tracking-tight drop-shadow-sm leading-tight">
                                জননী <span className="gradient-text">কোচিং সেন্টার</span>
                            </h1>
                            
                            {siteData?.heroSubtitle && (
                                <p className="text-lg md:text-2xl text-nature-800 font-medium mb-2 max-w-3xl drop-shadow-sm leading-relaxed px-2">
                                    {siteData.heroSubtitle}
                                </p>
                            )}

                            {siteData?.foundedYear && (
                                <p className="text-sm text-emerald-700 font-bold glass-panel px-4 py-1.5 rounded-full border-white/60 mb-2 mt-2">
                                    ✦ {siteData.foundedYear} সাল থেকে সাফল্যের শীর্ষ নাম ✦
                                </p>
                            )}
                            
                            <CountdownTimer />

                            <div className="flex flex-col sm:flex-row gap-4 w-full justify-center px-4 mt-10">
                                <button onClick={() => setPopupOpen(true)} className="glass-btn px-8 py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2 shadow-lg animate-pulse-glow hover:scale-105 transition">

                        <div className="max-w-7xl mx-auto px-4 flex justify-between items-center h-20 md:h-24">
                            <div className="flex items-center gap-3 md:gap-4 cursor-pointer group" onClick={() => navigateTo('home')}>
                                <div className="bg-white/50 p-1 md:p-1.5 rounded-xl border border-white/60 shadow-sm group-hover:scale-105 transition duration-300">
                                    <img src={LOGO_URL} alt="Logo" className="h-10 md:h-14 w-auto drop-shadow-md" />
                                </div>
                                <span className="font-extrabold text-xl md:text-3xl text-nature-950 tracking-tight drop-shadow-sm">Janani Coaching</span>
                            </div>

                            <nav className="hidden lg:flex gap-6 xl:gap-8 items-center font-bold text-sm xl:text-base">
                                {navLinks.map(l => (
                                    <button key={l.key} onClick={() => navigateTo(l.key)}
                                        className={`hover:text-emerald-700 transition ${view === l.key || (l.key === 'teachers' && view === 'profile') ? 'text-emerald-700 border-b-2 border-emerald-600 pb-1' : 'text-nature-800'}`}>
                                        {l.label}
                                    </button>
                                ))}
                                <div className="h-6 w-px bg-nature-400/50 mx-1"></div>
                                <a href="student_portal.html" className="glass-panel text-emerald-900 px-5 xl:px-6 py-2.5 rounded-xl hover:bg-white/60 transition flex items-center gap-2 border-white/80 shadow-sm">
                                    <Icons.User /> পোর্টাল
                                </a>
                                <a href="admin.html" className="glass-btn px-5 xl:px-6 py-2.5 rounded-xl transition flex items-center gap-2 shadow-md hover:scale-105">
                                    <Icons.Settings /> অ্যাডমিন
                                </a>
                            </nav>

                            <button className="lg:hidden text-nature-900 bg-white/50 border border-white/60 p-2.5 rounded-xl backdrop-blur-md shadow-sm z-50 relative active:scale-95 transition" onClick={() => setIsMobileMenuOpen(o => !o)}>
                                {isMobileMenuOpen ? <Icons.X /> : <Icons.Menu />}
                            </button>
                        </div>

                        {/* Mobile Dropdown */}
                        {isMobileMenuOpen && (
                            <div className="lg:hidden glass-nav border-t border-white/60 px-4 py-6 flex flex-col gap-3 shadow-2xl absolute w-full left-0 top-full font-bold z-40">
                                {navLinks.map(l => (
                                    <button key={l.key} onClick={() => navigateTo(l.key)} className="text-left text-nature-900 p-3 hover:bg-white/60 rounded-xl transition border border-transparent">{l.label}</button>
                                ))}
                                <div className="border-t border-white/40 my-1"></div>
                                <a href="student_portal.html" className="bg-white/60 border border-white/80 text-emerald-900 text-center p-3.5 rounded-xl flex justify-center gap-2 shadow-sm transition hover:bg-white/80"><Icons.User /> পোর্টাল</a>
                                <a href="admin.html" className="glass-btn text-center p-3.5 rounded-xl flex justify-center gap-2 shadow-md"><Icons.Settings /> অ্যাডমিন</a>
                            </div>
                        )}
                    </header>

                    {/* MAIN CONTENT */}
                    <main className="flex-grow">
                        {view === 'home'     && <HomeView navigateTo={navigateTo} siteData={siteData} setPopupOpen={setShowPopup} />}
                        {view === 'teachers' && <TeachersView navigateTo={navigateTo} onSelectTeacher={setSelectedTeacher} />}
                        {view === 'profile'  && <TeacherProfileView teacher={selectedTeacher} navigateTo={navigateTo} />}
                        {view === 'gallery'  && <GalleryView />}
                        {view === 'notices'  && <NoticesView />}
                    </main>

                    {/* FOOTER */}
                    <footer className="glass-panel-dark text-slate-200 py-16 md:py-20 px-4 mt-auto">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 lg:gap-16 relative z-10">
                            <div>
                                <img src={LOGO_URL} alt="Logo" loading="lazy" className="h-16 md:h-20 w-auto mb-6 opacity-90 filter brightness-0 invert drop-shadow-md" />
                                <h3 className="text-2xl md:text-3xl font-extrabold text-white mb-4 drop-shadow-sm">জননী কোচিং সেন্টার</h3>
                                <p className="text-sm md:text-base leading-relaxed max-w-sm text-nature-200 opacity-90">
                                    {siteData?.footerTagline || '"Together we make a better future" — ঠাকুরগাঁওয়ের অন্যতম নির্ভরযোগ্য শিক্ষা প্রতিষ্ঠান।'}
                                </p>
                            </div>
                            <div>
                                <h3 className="text-lg md:text-xl font-bold text-emerald-400 mb-6 uppercase tracking-widest">যোগাযোগ</h3>
                                <ul className="space-y-5 text-sm md:text-base font-medium">
                                    <li className="flex items-center gap-4">
                                        <span className="w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl bg-white/10 border border-white/20 flex items-center justify-center text-white backdrop-blur-md shadow-inner shrink-0"><Icons.Phone /></span>
                                        <a href={`tel:${siteData?.phone || '01722999475'}`} className="hover:text-emerald-400 transition">{siteData?.phone || '০১৭২২-৯৯৯৪৭৫'}</a>
                                    </li>
                                    <li className="flex items-start gap-4">
                                        <span className="w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl bg-white/10 border border-white/20 flex items-center justify-center text-white backdrop-blur-md shadow-inner shrink-0 mt-1"><Icons.MapPin /></span>
                                        <span className="leading-relaxed pt-1">{siteData?.address || 'শিবগঞ্জ বাজার (মায়ের দোয়া সাহাদুল হোটেলের সামনে), ঠাকুরগাঁও সদর, ঠাকুরগাঁও'}</span>
                                    </li>
                                </ul>
                            </div>
                            <div>
                                <h3 className="text-lg md:text-xl font-bold text-emerald-400 mb-6 uppercase tracking-widest">কুইক লিংক</h3>
                                <ul className="space-y-4 text-sm md:text-base font-medium text-nature-200">
                                    {navLinks.map(l => (
                                        <li key={l.key}><button onClick={() => navigateTo(l.key)} className="hover:text-emerald-400 transition flex items-center gap-3"><span className="text-nature-400/50">›</span> {l.label}</button></li>
                                    ))}
                                    <li><a href="student_portal.html" className="hover:text-emerald-400 transition flex items-center gap-3"><span className="text-nature-400/50">›</span> স্টুডেন্ট পোর্টাল</a></li>
                                </ul>
                            </div>
                        </div>
                        <div className="text-center text-xs md:text-sm mt-16 pt-8 border-t border-white/10 text-nature-400/80 relative z-10 font-medium tracking-wide">
                            &copy; {new Date().getFullYear()} জননী কোচিং সেন্টার। সর্বস্বত্ব সংরক্ষিত।
                        </div>
                    </footer>
                    
                    {/* Sticky Call Button for Mobile */}
                    <div className="fixed bottom-0 left-0 w-full md:hidden bg-nature-950/90 backdrop-blur-lg border-t border-white/10 p-3 z-50 flex justify-between items-center px-4 shadow-[0_-10px_20px_rgba(0,0,0,0.3)]">
                        <span className="text-white font-bold text-sm animate-pulse">নতুন ব্যাচে ভর্তি চলছে!</span>
                        <a href={`tel:${siteData?.phone || '01722999475'}`} className="glass-btn px-5 py-2 rounded-xl font-bold text-sm flex items-center gap-2 shadow-lg">
                            <Icons.Phone /> কল করুন
                        </a>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
