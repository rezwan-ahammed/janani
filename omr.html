<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janani OMR Scanner - Secure Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://esm.sh/firebase@10.5.0/app",
        "firebase/firestore": "https://esm.sh/firebase@10.5.0/firestore",
        "firebase/auth": "https://esm.sh/firebase@10.5.0/auth"
      }
    }
    </script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800&display=swap');
      
      :root {
        --nature-50: #ecfdf5; --nature-100: #d1fae5; --nature-200: #a7f3d0;
        --nature-300: #6ee7b7; --nature-400: #34d399; --nature-500: #10b981;
        --nature-600: #059669; --nature-700: #047857; --nature-800: #065f46;
        --nature-900: #064e3b; --nature-950: #022c22;
        --warn: #f59e0b; --warn-light: #fef3c7; --warn-border: #fde68a;
      }
      
      body { 
        background-color: var(--nature-50); 
        font-family: 'Noto Sans Bengali', sans-serif !important; 
        overflow-x: hidden; 
        -webkit-font-smoothing: antialiased; 
      }
      
      .glass-panel { background: rgba(255,255,255,0.45); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.7); box-shadow: 0 10px 40px 0 rgba(4,120,87,0.08); }
      .glass-panel-dark { background: rgba(2,44,34,0.85); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 32px 0 rgba(0,0,0,0.3); }
      .glass-nav { background: rgba(236,253,245,0.85); backdrop-filter: blur(24px); border-bottom: 1px solid rgba(255,255,255,0.9); }
      .glass-btn { background: linear-gradient(135deg, #10b981, #059669); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 4px 15px rgba(16,185,129,0.4), inset 0 1px 0 rgba(255,255,255,0.4); color: white; transition: all 0.3s ease; cursor: pointer; }
      .glass-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(16,185,129,0.5), inset 0 1px 0 rgba(255,255,255,0.5); background: linear-gradient(135deg, #059669, #047857); }
      .glass-btn:disabled { opacity: 0.6; cursor: not-allowed; }
      
      .bg-shapes { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; background: linear-gradient(135deg, #f0fdf4 0%, #ccfbf1 100%); }
      .shape-1 { position: absolute; top: -10%; left: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(52,211,153,0.3) 0%, rgba(16,185,129,0) 70%); border-radius: 50%; filter: blur(60px); animation: blob 10s infinite alternate; }
      .shape-2 { position: absolute; top: 40%; right: -20%; width: 70vw; height: 70vw; background: radial-gradient(circle, rgba(45,212,191,0.25) 0%, rgba(20,184,166,0) 70%); border-radius: 50%; filter: blur(80px); animation: blob 12s infinite alternate-reverse; }
      
      .gradient-text { background: linear-gradient(to right, #065f46, #0d9488); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .answer-cell-uncertain { background: var(--warn-light) !important; border-color: var(--warn-border) !important; box-shadow: 0 0 0 2px rgba(245,158,11,0.3); }
      .answer-cell-uncertain select { color: #92400e !important; }
      
      .progress-bar { height: 6px; border-radius: 99px; background: rgba(255,255,255,0.3); overflow: hidden; width: 100%; max-width: 300px; margin: 10px 0; }
      .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(to right, #34d399, #10b981); transition: width 0.8s ease; }
      
      @keyframes blob { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(30px, -50px) scale(1.1); } 66% { transform: translate(-20px, 20px) scale(0.9); } 100% { transform: translate(0px, 0px) scale(1); } }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(16,185,129,0.5); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Camera, Upload, Save, List, CheckCircle2, AlertCircle, Loader2, Trash2, X, Check, ClipboardList, 
            Sparkles, Wand2, Type, Image as ImageIcon, Send, BookOpen, Plus, ChevronDown, Hash, Calendar, FileText,
            GraduationCap, Layers, ArrowRight, Edit3, Search, Filter, Cpu, Database, RefreshCw, User, MoreHorizontal, 
            FileCheck, AlertTriangle, Eye, RotateCcw, Zap, Shield, MessageSquare, Copy, BarChart, PieChart, TrendingUp
        } from 'lucide-react';

        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, doc, setDoc, getDocs, getDoc, onSnapshot, query, addDoc, serverTimestamp, deleteDoc } from 'firebase/firestore';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';

        // ─── Firebase Configuration (Replace with your actual config) ───
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch(e) {
            console.warn("Firebase config is missing or invalid. App will run in UI-only mode.", e);
        }

        const appId = 'janani-omr-official';
        const SET_NAMES = ["শহীদ ওসমান হাদী", "শহীদ মীর মুগ্ধ", "শহীদ আবু সাঈদ", "শহীদ আবরার ফাহাদ"];
        const SUBJECTS = ["বাংলা", "ইংরেজি", "গণিত", "পদার্থবিজ্ঞান", "রসায়ন", "জীববিজ্ঞান", "উচ্চতর গণিত", "ICT", "ইসলাম ও নৈতিক শিক্ষা", "বাংলাদেশ ও বিশ্বপরিচয়", "অন্যান্য"];
        const CLASSES = ["ষষ্ঠ শ্রেণি", "সপ্তম শ্রেণি", "অষ্টম শ্রেণি", "নবম শ্রেণি", "দশম শ্রেণি", "একাদশ শ্রেণি", "দ্বাদশ শ্রেণি"];
        const OPTIONS = ['ক', 'খ', 'গ', 'ঘ'];

        // ─── AI Prompts ───
        const buildPass1Prompt = (totalQuestions, setNames) => `
You are an expert OMR evaluation AI. Analyze this sheet with maximum accuracy.
Return ONLY valid JSON.
{
  "name": "student name here",
  "roll": "6-digit roll from bubble grid",
  "set": "exact set name",
  "answers": { "1": "ক", "2": "খ" },
  "uncertain": ["3", "7"]
}`;

        // ─── Main Application Component ───
        const App = () => {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(false); // Set to false so UI renders immediately
            const [activeTab, setActiveTab] = useState('scan');
            const [exams, setExams] = useState([{id: '1', name: 'মডেল টেস্ট ০১', subject: 'বাংলা', className: 'নবম শ্রেণি', totalQuestions: 30, examId: 'EX-TEST1'}]);
            const [selectedExam, setSelectedExam] = useState(null);
            const [allResults, setAllResults] = useState([]);
            const [multiSetKeys, setMultiSetKeys] = useState({});
            
            const [isScanning, setIsScanning] = useState(false);
            const [scanStep, setScanStep] = useState("");
            const [scanPass, setScanPass] = useState(1);
            const [tempScanData, setTempScanData] = useState(null);
            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [statusMsg, setStatusMsg] = useState({ type: '', text: '' });
            
            const fileInputRef = useRef(null);

            useEffect(() => {
                if(!auth) return;
                setAuthLoading(true);
                signInAnonymously(auth).catch(console.error);
                const unsub = onAuthStateChanged(auth, (usr) => {
                    setUser(usr);
                    setAuthLoading(false);
                });
                return () => unsub();
            }, []);

            const showStatus = (type, text) => {
                setStatusMsg({ type, text });
                setTimeout(() => setStatusMsg({ type: '', text: '' }), 5000);
            };

            const safeJsonParse = (text) => {
                try {
                    const cleaned = (text || '').replace(/```json[\s\S]*?```|```[\s\S]*?```/g, m => m.replace(/```json|```/g, '')).trim();
                    const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
                    return jsonMatch ? JSON.parse(jsonMatch[0]) : JSON.parse(cleaned);
                } catch (e) { throw new Error("AI ডেটা পার্স করতে সমস্যা হয়েছে।"); }
            };

            // ─── Secure Backend Call (Pointing to your new Cloudflare Worker) ───
            const callSecureBackend = async (prompt, b64, mimeType) => {
                // Your deployed Cloudflare Worker URL
                const backendUrl = "https://jananibackend.rezwan-ahammed-rz.workers.dev";
                
                const payload = {
                    prompt: prompt,
                    base64Image: b64,
                    mimeType: mimeType
                };

                const res = await fetch(backendUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                
                // If using Gemini through proxy
                let textResponse = data?.candidates?.[0]?.content?.parts?.[0]?.text;
                // If using Claude AI Gateway format
                if(!textResponse) textResponse = data.response; 
                
                return textResponse || JSON.stringify(data);
            };

            const handleScan = async (e) => {
                const file = e.target.files[0];
                if (!file || !selectedExam) return;
                e.target.value = ''; 
                
                setIsScanning(true);
                setScanPass(1);
                setScanStep("আপনার ক্লাউডফ্লেয়ার ব্যাকএন্ডে ডেটা পাঠানো হচ্ছে...");

                try {
                    const b64 = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.onerror = reject;
                    });

                    const prompt = buildPass1Prompt(selectedExam.totalQuestions, SET_NAMES);
                    const rawResponse = await callSecureBackend(prompt, b64, file.type || 'image/jpeg');
                    const pass1 = safeJsonParse(rawResponse);

                    setTempScanData({
                        name: pass1.name || 'অজানা',
                        roll: pass1.roll || '000000',
                        set: pass1.set || SET_NAMES[0],
                        answers: pass1.answers || {},
                        allUncertain: pass1.uncertain || [],
                        score: 0,
                        total: selectedExam.totalQuestions
                    });

                    setShowConfirmModal(true);
                } catch (err) {
                    showStatus('error', `স্ক্যান ব্যর্থ: ${err.message}`);
                } finally {
                    setIsScanning(false);
                }
            };

            if (authLoading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-[#ecfdf5]">
                    <div className="bg-white p-6 rounded-full shadow-lg mb-4 border border-emerald-100">
                        <Loader2 className="animate-spin text-emerald-500" size={40}/>
                    </div>
                    <p className="font-bold text-emerald-800 animate-pulse tracking-widest uppercase text-xs">Connecting Janani Backend...</p>
                </div>
            );

            return (
                <div className="min-h-screen text-[#022c22] font-sans relative z-10 overflow-hidden">
                    <div className="bg-shapes"><div className="shape-1"></div><div className="shape-2"></div></div>
                    
                    {/* Navbar */}
                    <nav className="glass-nav sticky top-0 z-40">
                        <div className="max-w-6xl mx-auto flex justify-between items-center p-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-white/50 p-2 rounded-xl border border-white/60 shadow-sm">
                                    <Shield size={24} className="text-[#059669]" />
                                </div>
                                <div>
                                    <h1 className="text-xl font-extrabold tracking-tight gradient-text drop-shadow-sm">Janani Cloudflare</h1>
                                    <p className="text-[10px] font-bold text-[#059669] uppercase tracking-widest leading-none mt-0.5">Secure Edge Engine</p>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-4 mt-8 relative z-10">
                        
                        {/* Exam Selection Mock */}
                        <div className="glass-panel p-5 rounded-3xl mb-8 flex items-center justify-between cursor-pointer bg-white/40">
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-white/80 rounded-2xl text-[#059669] shadow-sm"><BookOpen size={24} /></div>
                                <div>
                                    <p className="text-[10px] font-black text-[#047857] uppercase tracking-widest">বর্তমান পরীক্ষা</p>
                                    <h3 className="text-lg font-black text-[#022c22] leading-none mt-1">
                                        {selectedExam ? selectedExam.name : "পরীক্ষা নির্বাচন করুন (Mock)"}
                                    </h3>
                                </div>
                            </div>
                            <button onClick={() => setSelectedExam(exams[0])} className="glass-btn px-4 py-2 rounded-xl text-sm font-bold">সিলেক্ট করুন</button>
                        </div>

                        {statusMsg.text && (
                            <div className={`glass-panel p-4 rounded-2xl mb-8 flex items-center gap-4 ${statusMsg.type === 'success' ? 'text-[#059669]' : 'text-red-600'}`}>
                                <div className="bg-white/60 p-2 rounded-full shadow-sm">{statusMsg.type === 'success' ? <CheckCircle2 size={18}/> : <AlertCircle size={18}/>}</div>
                                <p className="font-bold text-sm">{statusMsg.text}</p>
                            </div>
                        )}

                        {selectedExam && (
                            <div className="relative">
                                <div className={`glass-panel p-12 rounded-[50px] text-center flex flex-col items-center transition-all duration-500 ${isScanning ? 'blur-md pointer-events-none opacity-50' : ''}`}>
                                    <div className="w-36 h-36 bg-white/60 rounded-[40px] flex items-center justify-center mb-10 shadow-lg border border-white/80">
                                        <Camera className="text-[#059669]" size={72}/>
                                    </div>
                                    <h2 className="text-4xl font-extrabold mb-4 text-[#022c22] tracking-tight">{selectedExam.name}</h2>
                                    <p className="mb-10 text-[#065f46] font-bold">Cloudflare API Test Interface</p>
                                    <button onClick={() => fileInputRef.current.click()} className="glass-btn px-16 py-6 rounded-[35px] font-extrabold text-2xl flex items-center gap-4">
                                        <Upload size={28}/> ওএমআর স্ক্যান করুন
                                    </button>
                                    <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleScan}/>
                                </div>

                                {isScanning && (
                                    <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-white/40 backdrop-blur-xl rounded-[50px] border border-white/80 shadow-2xl">
                                        <Loader2 className="animate-spin text-[#10b981] mb-4" size={48} />
                                        <h3 className="text-xl font-black text-[#022c22] mb-2 uppercase">Janani Backend</h3>
                                        <p className="text-sm font-bold text-[#047857]">{scanStep}</p>
                                    </div>
                                )}
                            </div>
                        )}
                        
                        {/* Result Modal Mock */}
                        {showConfirmModal && tempScanData && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#022c22]/80 backdrop-blur-md">
                                <div className="glass-panel bg-white/90 w-full max-w-2xl rounded-[40px] shadow-2xl overflow-hidden">
                                    <div className="bg-gradient-to-r from-[#10b981] to-[#059669] p-6 text-white text-center">
                                        <h2 className="text-2xl font-extrabold">খাতা মূল্যায়িত হয়েছে</h2>
                                        <p className="text-sm mt-1 opacity-80">Processed via Cloudflare Worker</p>
                                    </div>
                                    <div className="p-8">
                                        <pre className="bg-white/50 p-4 rounded-xl border border-white/80 text-sm font-mono overflow-auto max-h-64 mb-6">
                                            {JSON.stringify(tempScanData, null, 2)}
                                        </pre>
                                        <button onClick={() => setShowConfirmModal(false)} className="w-full py-4 glass-btn rounded-[25px] font-extrabold text-xl shadow-lg">
                                            বন্ধ করুন
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
